global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'deepiri-gpu'
    static_configs:
      - targets: ['deepiri-gpu:8000']
    metrics_path: '/metrics'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'gpu-exporter'
    static_configs:
      - targets: ['deepiri-gpu:8000']
    scrape_interval: 5s
